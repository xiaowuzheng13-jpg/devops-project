name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 3.145.3.204
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd devops-project
            git pull
            docker compose down
            docker compose up -d --build
